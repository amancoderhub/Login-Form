<app-header></app-header>

<div class="container">
    <div class="row">
        <div class="form">
            <form [formGroup]="loginForm" (ngSubmit)="OnSubmit()">
                <h2 class="heading"><strong>Login Form</strong></h2>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" class="input" placeholder="Please Fill Name" formControlName="email" required>
                    <div *ngIf="loginForm.controls['email']?.invalid && (loginForm.controls['email']?.dirty || loginForm.controls['email']?.touched)">
                        <div class="help" *ngIf="loginForm.controls['email'].hasError('required')">
                             Email must be required.
                        </div>
                        <div class="help" *ngIf="loginForm.controls['email'].hasError('pattern')">
                            Email must be in valid formet.
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="input" placeholder="Please Fill Password" formControlName="password" required>
                    <div *ngIf="loginForm.controls['password']?.invalid && (loginForm.controls['password']?.dirty || loginForm.controls['password']?.touched)" class="help">
                        <div class="help" *ngIf="loginForm.controls['password'].hasError('required')">
                          Password must be required.
                        </div>
                        <div class="help" *ngIf="loginForm.controls['password'].hasError('minlength')">
                          Password must be at least 6 characters long.
                        </div>
                        <div class="help" *ngIf="loginForm.controls['password'].hasError('pattern')">
                          Password must be Strong Add Special @, # Charecter.
                        </div>
                    </div>
                </div>
                <div class="button">
                    <button  type="submit" class="btn btn-default" [disabled]="!loginForm">Login </button>
                </div>
            </form>
        </div>
    </div>
</div>
